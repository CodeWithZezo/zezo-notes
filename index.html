<!doctype html>
<html lang="en">
  <head>
    <!-- ─── Basic Setup ───────────────────────────── -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Zezo Notes</title>
    <meta name="description" content="Developer notes, system design insights, backend learnings, and personal engineering docs by Zezo." />
    <meta name="robots" content="index, follow" />

    <!-- ─── Theme ─────────────────────────────────── -->
    <meta name="theme-color" content="#1A1816" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FAF9F6" media="(prefers-color-scheme: light)" />

    <!-- ─── Open Graph (Social Sharing) ───────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Zezo Notes" />
    <meta property="og:description" content="Developer notes, backend systems, and engineering learnings." />
    <meta property="og:image" content="/icon.png" />

    <!-- ─── Twitter Card ──────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Zezo Notes" />
    <meta name="twitter:description" content="Developer notes, backend systems, and engineering learnings." />
    <meta name="twitter:image" content="/icon.png" />

    <!-- ─── PWA / Mobile UX ───────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- ─── Favicon ───────────────────────────────── -->
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />

    <!-- Optional preload (faster fonts if you add later) -->
    <meta name="format-detection" content="telephone=no" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
